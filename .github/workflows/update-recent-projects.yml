name: Update Recent Projects

on:
  workflow_dispatch:
  schedule:
    - cron: "18 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update recent projects section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = 'JNHFlow21';
            const repo = 'JNHFlow21';
            const readmePath = 'README.md';

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              per_page: 100,
            });

            const recent = repos
              .filter((item) => !item.fork && item.name !== repo)
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
              .slice(0, 2);

            const start = '<!-- recent-projects:start -->';
            const end = '<!-- recent-projects:end -->';
            const cells = recent.map((item) => {
              return [
                '    <td width="48%" valign="top" align="center">',
                `      <a href="${item.html_url}">`,
                '        <picture>',
                `          <source srcset="https://github-readme-stats.vercel.app/api/pin/?username=${owner}&repo=${item.name}&hide_border=true&bg_color=00000000&title_color=E5E7EB&text_color=CBD5E1&icon_color=60A5FA" media="(prefers-color-scheme: dark)" />`,
                `          <source srcset="https://github-readme-stats.vercel.app/api/pin/?username=${owner}&repo=${item.name}&hide_border=true&bg_color=00000000&title_color=0F172A&text_color=334155&icon_color=2563EB" media="(prefers-color-scheme: light)" />`,
                `          <img src="https://github-readme-stats.vercel.app/api/pin/?username=${owner}&repo=${item.name}&hide_border=true&bg_color=00000000&title_color=0F172A&text_color=334155&icon_color=2563EB" />`,
                '        </picture>',
                '      </a>',
                '    </td>',
              ].join('\n');
            });

            while (cells.length < 2) {
              cells.push('    <td width="48%" valign="top"></td>');
            }

            const block = [
              '<table>',
              '  <tr>',
              [cells[0], '    <td width="4%"></td>', cells[1]].join('\n'),
              '  </tr>',
              '</table>',
            ].join('\n');

            const readme = fs.readFileSync(readmePath, 'utf8');
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
            const next = readme.replace(pattern, `${start}\n${block}\n${end}`);

            if (next !== readme) {
              fs.writeFileSync(readmePath, next);
            }

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update recent projects"

      - name: Push changes
        run: git push

name: Update Recent Projects

on:
  workflow_dispatch:
  schedule:
    - cron: "18 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update recent projects section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = 'JNHFlow21';
            const repo = 'JNHFlow21';
            const readmePath = 'README.md';

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              per_page: 100,
            });

            const recent = repos
              .filter((item) => !item.fork && item.name !== repo)
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
              .slice(0, 4);

            const lines = recent.map((item) => {
              const description = item.description?.trim() || 'No description yet.';
              return `- [${item.name}](${item.html_url})  \n  ${description}`;
            });

            const block = lines.join('\n');
            const start = '<!-- recent-projects:start -->';
            const end = '<!-- recent-projects:end -->';

            const readme = fs.readFileSync(readmePath, 'utf8');
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
            const next = readme.replace(pattern, `${start}\n${block}\n${end}`);

            if (next !== readme) {
              fs.writeFileSync(readmePath, next);
            }

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update recent projects"

      - name: Push changes
        run: git push

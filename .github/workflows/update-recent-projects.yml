name: Update Recent Projects

on:
  workflow_dispatch:
  schedule:
    - cron: "18 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update recent projects section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = 'JNHFlow21';
            const repo = 'JNHFlow21';
            const readmePath = 'README.md';

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              per_page: 100,
            });

            const recent = repos
              .filter((item) => !item.fork && item.name !== repo)
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
              .slice(0, 2);

            const escapeHtml = (value) =>
              (value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');

            const tagsFor = (item) => {
              const text = `${item.name} ${item.description || ''}`.toLowerCase();
              const tags = [];

              if (text.includes('ai') || text.includes('agent') || text.includes('copilot')) {
                tags.push(['AI Product', '0F172A']);
              }

              if (
                text.includes('tool') ||
                text.includes('framework') ||
                text.includes('dashboard') ||
                text.includes('skill')
              ) {
                tags.push(['Tooling', '1D4ED8']);
              }

              if (
                text.includes('automation') ||
                text.includes('workflow') ||
                text.includes('bot')
              ) {
                tags.push(['Automation', '334155']);
              }

              if (tags.length === 0) {
                tags.push(['Builder', '475569']);
              }

              return tags.slice(0, 2);
            };

            const cells = recent.map((item) => {
              const description = escapeHtml(item.description?.trim() || 'No description yet.');
              const badges = tagsFor(item)
                .map(
                  ([label, color]) =>
                    `<img src="https://img.shields.io/badge/${encodeURIComponent(label.replace(/ /g, '_'))}-${color}?style=flat-square" />`
                )
                .join('\n      ');

              return [
                '    <td width="50%" valign="top">',
                `      <strong><a href="${item.html_url}">${escapeHtml(item.name)}</a></strong><br/>`,
                `      ${badges}<br/>`,
                `      ${description}`,
                '    </td>',
              ].join('\n');
            });

            while (cells.length < 2) {
              cells.push('    <td width="50%" valign="top"></td>');
            }

            const block = [
              '<table>',
              '  <tr>',
              cells.join('\n'),
              '  </tr>',
              '</table>',
            ].join('\n');
            const start = '<!-- recent-projects:start -->';
            const end = '<!-- recent-projects:end -->';

            const readme = fs.readFileSync(readmePath, 'utf8');
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
            const next = readme.replace(pattern, `${start}\n${block}\n${end}`);

            if (next !== readme) {
              fs.writeFileSync(readmePath, next);
            }

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update recent projects"

      - name: Push changes
        run: git push
